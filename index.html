<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Steam Search Working</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    text-align: center;
}

input {
    width: 320px;
    padding: 10px;
    font-size: 16px;
    margin-top: 20px;
}

.result {
    margin: 10px auto;
    padding: 10px;
    background: #222;
    border-radius: 8px;
    width: 60%;
    text-align: left;
}

.ok { color: lightgreen; }

#log {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    max-height: 120px;
    overflow-y: auto;
    background: black;
    font-size: 12px;
    padding: 8px;
    text-align: left;
}
</style>
</head>
<body>

<h1>Steam Search (WORKING)</h1>

<input id="search" placeholder="Type a game...">

<div id="results"></div>
<div id="log"></div>

<script>

function log(msg) {
    let d = document.createElement("div");
    d.textContent = "[LOG] " + msg;
    document.getElementById("log").appendChild(d);
}

// 🔥 SEARCH STEAM DIRECT (NO FULL LOAD)
document.getElementById("search").addEventListener("input", async e => {

    let value = e.target.value;

    if (!value) return;

    log("Searching: " + value);

    try {
        let res = await fetch(
            "https://store.steampowered.com/api/storesearch/?term=" +
            encodeURIComponent(value) +
            "&l=english&cc=US"
        );

        let data = await res.json();

        if (!data.items) {
            log("No results");
            return;
        }

        let results = data.items.slice(0, 10);

        document.getElementById("results").innerHTML = results.map(g => `
            <div class="result">
                🎮 <strong>${g.name}</strong><br>
                <span class="ok">Steam result</span>
            </div>
        `).join("");

        log("Results: " + results.length);

    } catch (err) {
        log("FAILED ❌ (network or viewer blocked)");
    }

});

</script>

</body>
</html>
